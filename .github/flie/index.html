<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimVPS | Real-time Status</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-orange: #ffaa00;
            --neon-red: #ff4444;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #001a33 0%, #050505 80%);
        }

        .brand-container {
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .brand-name {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin: 0;
            text-transform: uppercase;
            user-select: none;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.2rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
            font-family: monospace;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-overlay {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 60px; /* เพิ่มระยะห่างให้ดูสมดุล */
            font-family: monospace;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 50px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 8px; letter-spacing: 1px; }
        .stat-value { color: var(--neon-blue); font-size: 1.3rem; font-weight: bold; min-width: 100px; display: inline-block; }

        .hint {
            position: absolute;
            top: 20px;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="hint">CLICK THE NAME TO TOGGLE OFFLINE MODE</div>

    <div class="brand-container" onclick="toggleOffline()">
        <h1 class="brand-name">KimVPS</h1>
        <div class="status-container" id="status-box">
            <div class="pulse-dot" id="dot"></div>
            <span id="status-text">INITIALIZING...</span>
        </div>
    </div>

    <div class="stats-overlay">
        <div class="stat-item">
            <span class="stat-label">CPU LOAD</span>
            <span class="stat-value" id="cpu">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">RAM USAGE</span>
            <span class="stat-value" id="ram">0.0 GB</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">NETWORK TRAFFIC</span>
            <span class="stat-value" id="net">0.0 KB/s</span>
        </div>
    </div>

    <script>
        const OWNER = 'kimdev-source';
        const REPO = 'Vps';

        let isManualOffline = false;

        const cpuEl = document.getElementById('cpu');
        const ramEl = document.getElementById('ram');
        const netEl = document.getElementById('net');
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('dot');

        function toggleOffline() {
            isManualOffline = !isManualOffline;
            if (isManualOffline) {
                setTheme("OFFLINE", "var(--neon-red)");
                cpuEl.innerText = "0%";
                ramEl.innerText = "0.0 GB";
                netEl.innerText = "0.0 KB/s";
            } else {
                updateDashboard();
            }
        }

        async function updateDashboard() {
            if (isManualOffline) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=1`);
                const data = await res.json();
                const run = data.workflow_runs[0];

                if (!run) {
                    statusText.innerText = "NO ACTIONS FOUND";
                    return;
                }
                
                const isRunning = run.status === "in_progress" || run.status === "queued";
                const isSuccess = run.conclusion === "success";

                if (isRunning) {
                    setTheme("DEPLOYING...", "var(--neon-orange)");
                } else if (isSuccess) {
                    setTheme("SYSTEM ONLINE", "var(--neon-blue)");
                } else {
                    setTheme("ACTION FAILED", "var(--neon-red)");
                }
            } catch (err) {
                if (!isManualOffline) statusText.innerText = "CONN ERROR";
            }
        }

        function setTheme(text, color) {
            statusText.innerText = text;
            statusText.style.color = color;
            dot.style.backgroundColor = color;
            dot.style.boxShadow = `0 0 15px ${color}`;
        }

        function animateValues() {
            if (isManualOffline) return;

            const isBusy = statusText.innerText.includes("DEPLOYING");
            // สุ่มค่าให้ดู Real-time
            const cpu = isBusy ? Math.floor(Math.random() * 30) + 60 : Math.floor(Math.random() * 8) + 2;
            const ram = isBusy ? (Math.random() * (4.5 - 3.0) + 3.0).toFixed(1) : (Math.random() * (1.2 - 0.6) + 0.6).toFixed(1);
            const net = isBusy ? (Math.random() * 3500).toFixed(1) : (Math.random() * 20).toFixed(1);

            cpuEl.innerText = `${cpu}%`;
            ramEl.innerText = `${ram} GB`;
            netEl.innerText = `${net} KB/s`;
        }

        // เช็ค GitHub ทุก 20 วินาที
        setInterval(updateDashboard, 20000);
        // ตัวเลขขยับทุก 2 วินาที
        setInterval(animateValues, 2000);

        updateDashboard();
    </script>
</body>
</html>
