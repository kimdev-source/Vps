<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimVPS | Dashboard</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-orange: #ffaa00;
            --neon-red: #ff4444;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #001a33 0%, #050505 80%);
            overflow: hidden;
        }

        /* ส่วนหัวเรื่อง */
        .brand-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .brand-name {
            font-size: clamp(3.5rem, 18vw, 6rem); /* ขนาดปรับตามมือถือ */
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            margin: 0;
            text-transform: uppercase;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            color: var(--neon-blue);
            font-family: monospace;
            margin-top: 5px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* แก้บัค UI ด้านล่าง: ใช้ Flexbox ให้พอดีจอ 100% */
        .stats-overlay {
            position: fixed;
            bottom: 40px;
            width: 85%; /* ใช้ความกว้างพอดีจอ */
            max-width: 450px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* แบ่ง 3 คอลัมน์เท่าๆ กัน */
            background: rgba(255, 255, 255, 0.04);
            padding: 20px 10px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.15);
            box-sizing: border-box;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.6rem;
            color: #888;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: var(--neon-blue);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }

        /* ลบข้อความ Offline/Hint ออกไปแล้ว */
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="brand-name">KIMVPS</h1>
        <div class="status-container">
            <div class="pulse-dot" id="dot"></div>
            <span id="status-text">INITIALIZING...</span>
        </div>
    </div>

    <div class="stats-overlay">
        <div class="stat-item">
            <span class="stat-label">CPU LOAD</span>
            <span class="stat-value" id="cpu">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">RAM USAGE</span>
            <span class="stat-value" id="ram">0.0 GB</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">NETWORK</span>
            <span class="stat-value" id="net">0.0 KB/s</span>
        </div>
    </div>

    <script>
        const OWNER = 'kimdev-source';
        const REPO = 'Vps';

        async function updateStatus() {
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=1`);
                const data = await res.json();
                const run = data.workflow_runs[0];

                if (!run) return;

                const st = document.getElementById('status-text');
                const dt = document.getElementById('dot');

                if (run.status === "in_progress" || run.status === "queued") {
                    st.innerText = "DEPLOYING...";
                    st.style.color = "var(--neon-orange)";
                    dt.style.backgroundColor = "var(--neon-orange)";
                    dt.style.boxShadow = "0 0 15px var(--neon-orange)";
                } else if (run.conclusion === "success") {
                    st.innerText = "SYSTEM ONLINE";
                    st.style.color = "var(--neon-blue)";
                    dt.style.backgroundColor = "var(--neon-blue)";
                    dt.style.boxShadow = "0 0 15px var(--neon-blue)";
                } else {
                    st.innerText = "ACTION FAILED";
                    st.style.color = "var(--neon-red)";
                    dt.style.backgroundColor = "var(--neon-red)";
                    dt.style.boxShadow = "0 0 15px var(--neon-red)";
                }
            } catch (e) {
                document.getElementById('status-text').innerText = "API ERROR";
            }
        }

        // ตัวเลขขยับหลอกๆ ให้ดู Real-time
        setInterval(() => {
            const isBusy = document.getElementById('status-text').innerText.includes("DEPLOYING");
            document.getElementById('cpu').innerText = (isBusy ? Math.floor(Math.random() * 20) + 70 : Math.floor(Math.random() * 8) + 2) + "%";
            document.getElementById('ram').innerText = (isBusy ? (Math.random() * 1 + 3.2).toFixed(1) : (Math.random() * 0.3 + 0.5).toFixed(1)) + " GB";
            document.getElementById('net').innerText = (isBusy ? (Math.random() * 2000).toFixed(1) : (Math.random() * 20).toFixed(1)) + " KB/s";
        }, 2000);

        setInterval(updateStatus, 15000);
        updateStatus();
    </script>
</body>
</html>
