<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimVPS | Management System</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-orange: #ffaa00;
            --neon-red: #ff4444;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #001a33 0%, #050505 80%);
        }

        .brand-container {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .brand-name {
            font-size: clamp(3rem, 15vw, 5.5rem); /* ปรับขนาดตามหน้าจออัตโนมัติ */
            font-weight: 800;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            margin: 0;
            text-transform: uppercase;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
            font-family: monospace;
            margin-top: 10px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* แก้บัค Stats: ใช้ Flexbox แบบกระจายตัวให้พอดีหน้าจอ */
        .stats-overlay {
            position: absolute;
            bottom: 50px;
            display: flex;
            justify-content: space-around;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 10px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.65rem;
            color: #777;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-value {
            color: var(--neon-blue);
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="brand-name">KimVPS</h1>
        <div class="status-container">
            <div class="pulse-dot" id="dot"></div>
            <span id="status-text">SYNCING...</span>
        </div>
    </div>

    <div class="stats-overlay">
        <div class="stat-item">
            <span class="stat-label">CPU LOAD</span>
            <span class="stat-value" id="cpu">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">RAM USAGE</span>
            <span class="stat-value" id="ram">0.0 GB</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">NETWORK</span>
            <span class="stat-value" id="net">0.0 KB/s</span>
        </div>
    </div>

    <script>
        const OWNER = 'kimdev-source';
        const REPO = 'Vps';

        async function updateDashboard() {
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=1`);
                const data = await res.json();
                const run = data.workflow_runs[0];

                if (!run) return;

                const statusText = document.getElementById('status-text');
                const dot = document.getElementById('dot');

                if (run.status === "in_progress" || run.status === "queued") {
                    updateUI("DEPLOYING...", "var(--neon-orange)", statusText, dot);
                } else if (run.conclusion === "success") {
                    updateUI("SYSTEM ONLINE", "var(--neon-blue)", statusText, dot);
                } else {
                    updateUI("ACTION FAILED", "var(--neon-red)", statusText, dot);
                }
            } catch (e) {
                console.error("API Error");
            }
        }

        function updateUI(txt, col, el, dt) {
            el.innerText = txt;
            el.style.color = col;
            dt.style.backgroundColor = col;
            dt.style.boxShadow = `0 0 15px ${col}`;
        }

        // สุ่มตัวเลขให้ดู Real-time (อ้างอิงสถานะจริง)
        setInterval(() => {
            const isBusy = document.getElementById('status-text').innerText.includes("DEPLOYING");
            document.getElementById('cpu').innerText = (isBusy ? Math.floor(Math.random() * 30) + 60 : Math.floor(Math.random() * 8) + 2) + "%";
            document.getElementById('ram').innerText = (isBusy ? (Math.random() * 1.2 + 2.8).toFixed(1) : (Math.random() * 0.4 + 0.6).toFixed(1)) + " GB";
            document.getElementById('net').innerText = (isBusy ? (Math.random() * 1500).toFixed(1) : (Math.random() * 12).toFixed(1)) + " KB/s";
        }, 2000);

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
